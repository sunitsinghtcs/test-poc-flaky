name: Playwright Flaky Test Detection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests & Detect Flakiness
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore flaky store cache
        uses: actions/cache@v4
        with:
          path: flaky-results/flaky-store.json
          key: flaky-store-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            flaky-store-${{ github.ref_name }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npm run test:ci
        continue-on-error: true

      - name: Analyse flaky test trends
        run: npm run flaky:analyze

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload flaky store
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-store-${{ github.run_id }}
          path: flaky-results/flaky-store.json
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          echo "## Flaky Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm run flaky:analyze 2>&1 || true >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY