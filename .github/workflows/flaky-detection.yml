name: Playwright Flaky Test Detection

on:
  push:
    branches:
      - '**'          # trigger on ALL branch pushes
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests & Detect Flakiness
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      # Cache flaky + heal store per branch so history accumulates across runs
      - name: Restore flaky store cache
        uses: actions/cache@v4.2.3
        with:
          path: |
            flaky-results/flaky-store.json
            flaky-results/heal-store.json
          key: flaky-store-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            flaky-store-${{ github.ref_name }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # Run tests — continue even if tests fail so analysis always runs
      - name: Run Playwright tests
        run: npm run test:ci
        continue-on-error: true

      - name: Analyse flaky test trends
        run: npm run flaky:analyze
        continue-on-error: true

      - name: Analyse self-healing events
        run: npm run healing:analyze
        continue-on-error: true

      - name: Generate HTML report
        run: npm run report:html:ci
        continue-on-error: true

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload flaky analysis HTML report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: flaky-html-report-${{ github.run_id }}
          path: flaky-results/report.html
          retention-days: 30

      - name: Upload flaky store
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: flaky-store-${{ github.run_id }}
          path: flaky-results/flaky-store.json
          retention-days: 30

      - name: Upload heal store
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: heal-store-${{ github.run_id }}
          path: flaky-results/heal-store.json
          retention-days: 30

      # ── GitHub Actions job summary ─────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Flaky Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm run flaky:analyze 2>&1 || true >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Self-Healing Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm run healing:analyze 2>&1 || true >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 Download the **flaky-html-report** artifact for the full interactive dashboard." >> $GITHUB_STEP_SUMMARY